<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
<rect x="0" y="0" width="1280" height="720" rx="8" fill="#ffffff" stroke="none" />
<text x="80" y="80" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#1f2937" text-anchor="start">What the 96 ML Rows Mean</text>
<text x="80" y="120" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#4b5563" text-anchor="start">The ML dataset is episode-level, not raw market ticks or raw trades</text>
<rect x="80" y="170" width="250" height="120" rx="8" fill="#f8fafc" stroke="#e5e7eb" /><rect x="80" y="170" width="8" height="120" rx="8" fill="#9b111e" stroke="none" /><text x="104" y="204" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#1f2937" text-anchor="start">Total Episode Rows</text><text x="104" y="252" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#9b111e" text-anchor="start">96</text>
<rect x="360" y="170" width="250" height="120" rx="8" fill="#f8fafc" stroke="#e5e7eb" /><rect x="360" y="170" width="8" height="120" rx="8" fill="#2563eb" stroke="none" /><text x="384" y="204" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#1f2937" text-anchor="start">Train</text><text x="384" y="252" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#2563eb" text-anchor="start">32</text>
<rect x="640" y="170" width="250" height="120" rx="8" fill="#f8fafc" stroke="#e5e7eb" /><rect x="640" y="170" width="8" height="120" rx="8" fill="#15803d" stroke="none" /><text x="664" y="204" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#1f2937" text-anchor="start">Validation</text><text x="664" y="252" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#15803d" text-anchor="start">32</text>
<rect x="920" y="170" width="250" height="120" rx="8" fill="#f8fafc" stroke="#e5e7eb" /><rect x="920" y="170" width="8" height="120" rx="8" fill="#e34b5b" stroke="none" /><text x="944" y="204" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#1f2937" text-anchor="start">Test</text><text x="944" y="252" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#e34b5b" text-anchor="start">32</text>
<text x="80" y="350" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#1f2937" text-anchor="start">Dataset split</text>
<rect x="160" y="390" width="960" height="80" rx="12" fill="#f3f4f6" stroke="#e5e7eb" />
<rect x="160" y="390" width="320.0" height="80" rx="12" fill="#2563eb" stroke="none" />
<rect x="480.0" y="390" width="320.0" height="80" rx="0" fill="#15803d" stroke="none" />
<rect x="800.0" y="390" width="320.0" height="80" rx="12" fill="#e34b5b" stroke="none" />
<text x="320.0" y="438" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">Train 32</text>
<text x="640.0" y="438" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">Validation 32</text>
<text x="960.0" y="438" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">Test 32</text>
<text x="100" y="560" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" fill="#1f2937" text-anchor="start">• Each row = one candidate/alert episode</text>
<text x="100" y="592" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" fill="#1f2937" text-anchor="start">• Features summarize wallet flow, imbalance, severity, and price/volume dynamics</text>
<text x="100" y="624" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" fill="#1f2937" text-anchor="start">• Rows carry a final success label based on the eventual outcome</text>
<text x="100" y="656" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" fill="#1f2937" text-anchor="start">• Used for held-out ranking evaluation, not autonomous trading</text>
</svg>